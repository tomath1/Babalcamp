<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1);
            background-size: 300% 300%;
            animation: gradientBG 10s ease infinite;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* خلفية بأشكال هندسية */
        body::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><polygon points="0,0 100,0 50,50" fill="white"/><polygon points="100,100 0,100 50,50" fill="white"/></svg>');
            background-size: 50px 50px;
            pointer-events: none;
        }

        .booking-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px 40px 40px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 480px;
            overflow: hidden;
            position: relative;
            z-index: 10;
            animation: fadeInScale 0.6s ease;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .booking-header {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .booking-header h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .booking-header p {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .booking-header::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 0;
            width: 100%;
            height: 40px;
            background: white;
            border-radius: 40px 40px 0 0;
        }

        .booking-form {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .input-field {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #ecf0f1;
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .input-field:focus {
            outline: none;
            border-color: #3498db;
            background: white;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.2);
        }

        .input-field:hover {
            border-color: #2c3e50;
        }

        .date-group {
            display: flex;
            gap: 10px;
        }

        .date-group select {
            flex: 1;
            padding: 15px;
            border: 2px solid #ecf0f1;
            border-radius: 15px;
            background: #f8f9fa;
            cursor: pointer;
            font-size: 1rem;
        }

        .date-group select:focus {
            outline: none;
            border-color: #3498db;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(52, 152, 219, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .features {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #ecf0f1;
        }

        .feature-item {
            text-align: center;
            flex: 1;
        }

        .feature-item i {
            font-size: 1.5rem;
            color: #3498db;
            margin-bottom: 5px;
        }

        .feature-item span {
            display: block;
            font-size: 0.8rem;
            color: #7f8c8d;
        }

        @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css');
    </style>
</head>
<body>
    <div class="booking-container">
        <div class="booking-header">
            <h1>Booking Form</h1>
            <p>Book your trip now at the best rates</p>
        </div>
        
        <div class="booking-form">
            <form>
                <div class="form-group">
                    <label><i class="fas fa-envelope" style="margin-left: 5px; color: #3498db;"></i> Email:</label>
                    <input type="email" class="input-field" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-calendar-alt" style="margin-left: 5px; color: #3498db;"></i> Departure Date:</label>
                    <div class="date-group">
                      <select id="day" required>
<option value="">Day</option>
<option>01</option><option>02</option><option>03</option><option>04</option><option>05</option>
<option>06</option><option>07</option><option>08</option><option>09</option><option>10</option>
<option>11</option><option>12</option><option>13</option><option>14</option><option>15</option>
<option>16</option><option>17</option><option>18</option><option>19</option><option>20</option>
<option>21</option><option>22</option><option>23</option><option>24</option><option>25</option>
<option>26</option><option>27</option><option>28</option><option>29</option><option>30</option>
<option>31</option>
</select>

<select id="month" required>
<option value="">Month</option>
<option>January</option>
<option>February</option>
<option>March</option>
<option>April</option>
<option>May</option>
<option>June</option>
<option>July</option>
<option>August</option>
<option>September</option>
<option>October</option>
<option>November</option>
<option>December</option>
</select>

<select id="year" required>
<option value="">Year</option>
<option>2025</option>
<option>2026</option>
<option>2027</option>
<option>2028</option>
<option>2029</option>
<option>2030</option>
</select>
         
                    </div>
                </div>
<div class="form-group">
<label>
<i class="fas fa-phone-alt" style="margin-left:5px;color:#3498db;"></i>
Phone Number:
</label>

<div style="display:flex; gap:10px;">

<select required style="width:35%; padding:15px; border-radius:15px; border:2px solid #ecf0f1;">
<option value="">Code</option>
<option value="+20">🇪🇬 +20 Egypt</option>
<option value="+966">🇸🇦 +966 Saudi</option>
<option value="+971">🇦🇪 +971 UAE</option>
<option value="+965">🇰🇼 +965 Kuwait</option>
<option value="+974">🇶🇦 +974 Qatar</option>
<option value="+1">🇺🇸 +1 USA</option>
<option value="+44">🇬🇧 +44 UK</option>
</select>

<input 
type="tel" 
class="input-field" 
placeholder="Enter your phone number"
required
maxlength="11"
pattern="[0-9]{11}"
title="Please enter a phone number with exactly 11 digits">

</div>
</div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-paper-plane" style="margin-left: 10px;"></i>
                    Send Booking
                </button>
            </form>

            <div class="features">
                <div class="feature-item">
                    <i class="fas fa-shield-alt"></i>
                    <span>Safe payment</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-clock"></i>
                    <span>24-hour support</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-tag"></i>
                    <span>Best price</span>
                </div>
            </div>
        </div>
    </div>



<!-- أضف هذا داخل الـ <body> قبل نهاية </body> -->
<div id="thankyou-msg" style="display:none; text-align:center; margin-top:20px; padding:15px; background:#2ecc71; color:white; border-radius:15px; font-weight:bold; font-size:1rem; animation:fadeIn 0.5s;">
    Thank you! Your booking has been submitted successfully.
</div>

<script>
const form = document.querySelector('form');
const thankyouMsg = document.getElementById('thankyou-msg');

form.addEventListener('submit', function(e) {
    e.preventDefault(); // يمنع إعادة تحميل الصفحة

    // إظهار رسالة الشكر
    thankyouMsg.style.display = 'block';
    thankyouMsg.style.opacity = 0;
    let opacity = 0;
    const fadeIn = setInterval(() => {
        opacity += 0.05;
        thankyouMsg.style.opacity = opacity;
        if(opacity >= 1) clearInterval(fadeIn);
    }, 20);

    // إخفاء الرسالة بعد 4 ثواني
    setTimeout(() => {
        const fadeOut = setInterval(() => {
            opacity -= 0.05;
            thankyouMsg.style.opacity = opacity;
            if(opacity <= 0) {
                clearInterval(fadeOut);
                thankyouMsg.style.display = 'none';
            }
        }, 20);
    }, 4000);

    // إعادة تعيين النموذج
    form.reset();
});
</script>

<style>
@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}
</style>




<div id="message-box" style="display:none; text-align:center; margin-top:20px; padding:15px; border-radius:15px; font-weight:bold; font-size:1rem;"></div>

<script>
const form = document.querySelector('form');
const messageBox = document.getElementById('message-box');

form.addEventListener('submit', function(e) {
    e.preventDefault(); // يمنع إعادة تحميل الصفحة

    // الحصول على القيم
    const phone = form.querySelector('input[type="tel"]').value.trim();
    const day = form.querySelector('.date-group select:nth-child(1)').value;
    const month = form.querySelector('.date-group select:nth-child(2)').value;
    const year = form.querySelector('.date-group select:nth-child(3)').value;

    // التحقق من الحقول
    if(!phone) {
        showMessage('Please enter your phone number', 'red');
        return;
    }

    if(day === 'day' || month === 'Month' || year === 'Year') {
        showMessage('Please select a valid departure date', 'red');
        return;
    }

    // إذا كل شيء صحيح → عرض رسالة شكر
    showMessage('Thank you! Your booking has been submitted successfully.', '#2ecc71');

    // إعادة تعيين النموذج
    form.reset();
});

// دالة لإظهار الرسائل
function showMessage(text, color) {
    messageBox.textContent = text;
    messageBox.style.background = color === 'red' ? '#e74c3c' : color;
    messageBox.style.color = 'white';
    messageBox.style.display = 'block';
    messageBox.style.opacity = 0;
    
    let opacity = 0;
    const fadeIn = setInterval(() => {
        opacity += 0.05;
        messageBox.style.opacity = opacity;
        if(opacity >= 1) clearInterval(fadeIn);
    }, 20);

    if(color !== 'red') { // الرسالة الخضراء تختفي بعد 4 ثواني
        setTimeout(() => {
            const fadeOut = setInterval(() => {
                opacity -= 0.05;
                messageBox.style.opacity = opacity;
                if(opacity <= 0) {
                    clearInterval(fadeOut);
                    messageBox.style.display = 'none';
                }
            }, 20);
        }, 4000);
    }
}
</script>



</body>
</html>
