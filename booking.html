<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif;}
body {min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(45deg,#ff6b6b,#4ecdc4,#45b7d1); background-size:300% 300%; animation:gradientBG 10s ease infinite; padding:10px;}
@keyframes gradientBG {0% {background-position:0% 50%;}50% {background-position:100% 50%;}100% {background-position:0% 50%;}}
.booking-container {background:rgba(255,255,255,0.98); border-radius:40px; box-shadow:0 30px 60px rgba(0,0,0,0.3); width:100%; max-width:480px; overflow:hidden; position:relative; z-index:10; animation:fadeInScale 0.6s ease;}
@keyframes fadeInScale {from {opacity:0; transform:scale(0.9);} to {opacity:1; transform:scale(1);}}
.booking-header {background:linear-gradient(135deg,#2c3e50,#3498db); color:white; padding:30px; text-align:center; position:relative;}
.booking-header h1 {font-size:2rem; margin-bottom:5px; letter-spacing:1px;}
.booking-header p {opacity:0.9; font-size:0.9rem;}
.booking-form {padding:20px;}
.form-group {margin-bottom:15px;}
label {display:block; margin-bottom:5px; color:#2c3e50; font-weight:600; font-size:0.9rem;}
.input-field {width:100%; padding:12px 15px; border:2px solid #ecf0f1; border-radius:12px; font-size:0.95rem; background:#f8f9fa; transition:all 0.3s ease;}
.input-field:focus {outline:none; border-color:#3498db; background:white; box-shadow:0 5px 15px rgba(52,152,219,0.2);}
.input-field:hover {border-color:#2c3e50;}
.date-group {display:flex; gap:8px; flex-wrap:wrap;}
.date-group select {flex:1; padding:12px; border:2px solid #ecf0f1; border-radius:12px; background:#f8f9fa; cursor:pointer; font-size:0.95rem;}
.date-group select:focus {outline:none; border-color:#3498db;}
.btn-submit {width:100%; padding:14px; background:linear-gradient(135deg,#2c3e50,#3498db); color:white; border:none; border-radius:12px; font-size:1rem; font-weight:bold; cursor:pointer; transition:all 0.3s ease; margin-top:15px;}
.btn-submit:hover {transform:translateY(-2px); box-shadow:0 10px 20px rgba(52,152,219,0.4);}
#thankyou-msg {display:none; text-align:center; margin-top:20px; padding:15px; background:#2ecc71; color:white; border-radius:12px; font-weight:bold; font-size:0.95rem;}
@media(max-width:480px){
    .booking-header h1 {font-size:1.6rem;}
    .booking-header p {font-size:0.85rem;}
    .btn-submit {font-size:0.95rem; padding:12px;}
    .date-group {flex-direction:column;}
}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="booking-container">
    <div class="booking-header">
        <h1>Booking</h1>
        <p>Book your trip now at the best rates</p>
    </div>

    <div class="booking-form">
        <form action="https://formspree.io/f/xqeybpog" method="POST" id="bookingForm">
            <div class="form-group">
                <label><i class="fas fa-envelope" style="margin-left:5px;color:#3498db;"></i> Email:</label>
                <input type="email" name="email" class="input-field" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-calendar-alt" style="margin-left:5px;color:#3498db;"></i> Departure Date:</label>
                <div class="date-group">
                    <select name="day" required></select>
                    <select name="month" required>
                        <option value="">Month</option>
                        <option>January</option><option>February</option><option>March</option><option>April</option>
                        <option>May</option><option>June</option><option>July</option><option>August</option>
                        <option>September</option><option>October</option><option>November</option><option>December</option>
                    </select>
                    <select name="year" required>
                        <option value="">Year</option>
                        <option>2025</option><option>2026</option><option>2027</option><option>2028</option>
                        <option>2029</option><option>2030</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-phone-alt" style="margin-left:5px;color:#3498db;"></i> Phone Number:</label>
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <select name="code" required style="width:35%; padding:12px; border-radius:12px; border:2px solid #ecf0f1;">
                        <option value="">Code</option>
                        <option value="+20">🇪🇬 +20 Egypt</option>
                        <option value="+966">🇸🇦 +966 Saudi</option>
                        <option value="+971">🇦🇪 +971 UAE</option>
                        <option value="+965">🇰🇼 +965 Kuwait</option>
                        <option value="+974">🇶🇦 +974 Qatar</option>
                        <option value="+1">🇺🇸 +1 USA</option>
                        <option value="+44">🇬🇧 +44 UK</option>
                        <option value="+49">🇩🇪 +49 Germany</option>
                    </select>
                    <input type="tel" name="phone" class="input-field" placeholder="Enter your phone number" required maxlength="11" pattern="[0-9]{11}">
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-paper-plane"></i> Send Booking
            </button>
        </form>

        <div id="thankyou-msg">Thank you! Your booking has been submitted.</div>
    </div>
</div>

<script>
// الأيام حسب الشهر
const daySelect = document.querySelector('select[name="day"]');
const monthSelect = document.querySelector('select[name="month"]');

function getDaysInMonth(month){
    switch(month){
        case 'February': return 28;
        case 'April': case 'June': case 'September': case 'November': return 30;
        default: return 31;
    }
}

function updateDays(){
    const month = monthSelect.value;
    const days = getDaysInMonth(month);
    const currentDay = daySelect.value;
    daySelect.innerHTML = '<option value="">Day</option>';
    for(let i=1;i<=days;i++){
        const opt = document.createElement('option');
        opt.value = i.toString().padStart(2,'0');
        opt.textContent = i.toString().padStart(2,'0');
        daySelect.appendChild(opt);
    }
    if(currentDay && currentDay <= days) daySelect.value = currentDay;
}
monthSelect.addEventListener('change', updateDays);
updateDays();

// إرسال الفورم والتحقق من رقم الهاتف
const form = document.getElementById('bookingForm');
const thankyouMsg = document.getElementById('thankyou-msg');

form.addEventListener('submit', function(e){
    e.preventDefault();

    const countryCode = form.querySelector('select[name="code"]').value;
    const phone = form.querySelector('input[name="phone"]').value.trim();

    if(phone.length !== 11){
        alert('رقم الهاتف يجب أن يكون 11 رقم.');
        return;
    }

    if(countryCode === '+20' && !phone.startsWith('0')){
        alert('رقم الهاتف لا يتوافق مع كود الدولة مصر +20');
        return;
    }
    if(countryCode === '+966' && !phone.startsWith('5')){
        alert('رقم الهاتف لا يتوافق مع كود الدولة السعودية +966');
        return;
    }
    if(countryCode === '+971' && !phone.startsWith('5')){
        alert('رقم الهاتف لا يتوافق مع كود الدولة الإمارات +971');
        return;
    }
    if(countryCode === '+1' && !phone.startsWith('1')){
        alert('رقم الهاتف لا يتوافق مع كود الدولة أمريكا +1');
        return;
    }
    if(countryCode === '+44' && !phone.startsWith('7')){
        alert('رقم الهاتف لا يتوافق مع كود الدولة بريطانيا +44');
        return;
    }
    if(countryCode === '+49' && !phone.startsWith('1')){
        alert('رقم الهاتف لا يتوافق مع كود الدولة ألمانيا +49');
        return;
    }
    // أضف قواعد إضافية حسب الحاجة

    // إرسال البيانات
    const formData = new FormData(form);
    fetch(form.action, {method: form.method, body: formData, headers:{'Accept':'application/json'}})
    .then(response=>{
        if(response.ok){
            thankyouMsg.style.display='block';
            setTimeout(()=>{window.location.href='index.html';}, 2000);
            form.reset();
        } else { alert('Problem submitting booking. Try again.'); }
    }).catch(()=>{ alert('Problem submitting booking. Try again.'); });
});
</script>

</body>
</html>
