<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="description" content="Book your stay at Babel Camp in Hurghada, Red Sea, Egypt">
<meta name="theme-color" content="#0a1628">
<title>Babel Camp Booking | Hurghada Red Sea</title>
<link rel="icon" href="1.1.1.jpeg">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0a1628, #1a3a5c, #004d7a);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
  padding: 15px;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

body::before {
  content: '';
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 200px;
  background: url("https://kimi-web-img.moonshot.cn/img/www.egypttoursportal.com/21a57cafa1b3e689eb4ea785e3207d525cf2c33a.jpg") center/cover no-repeat;
  opacity: 0.15;
  z-index: 0;
  pointer-events: none;
}

.booking-container {
  background: rgba(255, 255, 255, 0.98);
  border-radius: 25px;
  box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
  width: 100%;
  max-width: 550px;
  overflow: hidden;
  position: relative;
  z-index: 10;
  animation: fadeInScale 0.6s ease;
}

@keyframes fadeInScale {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

.booking-header {
  background: linear-gradient(135deg, #0a1628, #006994, #00d4ff);
  color: white;
  padding: 30px 20px;
  text-align: center;
  position: relative;
}

.booking-header::after {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 1.5rem;
  opacity: 0.6;
}

.booking-header::before {
  position: absolute;
  top: 15px;
  left: 20px;
  font-size: 1.5rem;
  opacity: 0.6;
}

.booking-header h1 {
  font-size: 1.8rem;
  margin-bottom: 5px;
  letter-spacing: 1px;
  font-weight: 700;
}

.booking-header p {
  opacity: 0.9;
  font-size: 0.9rem;
  color: #a0d2eb;
}

.location-tag {
  display: inline-block;
  margin-top: 10px;
  padding: 5px 15px;
  background: rgba(0, 212, 255, 0.2);
  border: 1px solid rgba(0, 212, 255, 0.4);
  border-radius: 20px;
  font-size: 0.85rem;
  color: #00d4ff;
}

.booking-form {
  padding: 25px 20px;
}

.form-group {
  margin-bottom: 18px;
}

label {
  display: block;
  margin-bottom: 6px;
  color: #0a1628;
  font-weight: 600;
  font-size: 0.9rem;
}

.input-field {
  width: 100%;
  padding: 12px 15px;
  border: 2px solid #e0e8f0;
  border-radius: 12px;
  font-size: 0.95rem;
  background: #f8fafc;
  transition: all 0.3s ease;
  color: #0a1628;
}

.input-field:focus {
  outline: none;
  border-color: #006994;
  background: white;
  box-shadow: 0 5px 15px rgba(0, 105, 148, 0.2);
}

.input-field:hover {
  border-color: #00d4ff;
}

.date-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.date-group select {
  flex: 1;
  min-width: 80px;
  padding: 12px;
  border: 2px solid #e0e8f0;
  border-radius: 12px;
  background: #f8fafc;
  cursor: pointer;
  font-size: 0.95rem;
  color: #0a1628;
}

.date-group select:focus {
  outline: none;
  border-color: #006994;
}

.btn-submit {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #006994, #00d4ff);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 15px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.btn-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(0, 105, 148, 0.4);
}

.btn-submit:active {
  transform: translateY(0);
}

#thankyou-msg {
  display: none;
  text-align: center;
  margin-top: 20px;
  padding: 15px;
  background: linear-gradient(135deg, #00b894, #00d4ff);
  color: white;
  border-radius: 12px;
  font-weight: bold;
  font-size: 0.95rem;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

#priceSummary {
  display: none;
  margin-top: 15px;
  padding: 15px;
  border-radius: 12px;
  background: linear-gradient(135deg, #f1f5f9, #e0f2fe);
  font-weight: bold;
  color: #006994;
  border: 2px solid #00d4ff;
  text-align: center;
  font-size: 1.1rem;
}

.back-link {
  display: block;
  text-align: center;
  margin-top: 15px;
  color: #006994;
  text-decoration: none;
  font-size: 0.9rem;
  transition: color 0.3s ease;
}

.back-link:hover {
  color: #00d4ff;
}

@media (max-width: 520px) {
  body { padding: 10px; }
  .booking-header h1 { font-size: 1.5rem; }
  .booking-header p { font-size: 0.8rem; }
  .booking-form { padding: 20px 15px; }
  .btn-submit { font-size: 0.95rem; padding: 12px; }
  .date-group { flex-direction: column; }
  .date-group select { width: 100%; }
  .input-field { font-size: 16px; }
}

@media (max-width: 400px) {
  .booking-header h1 { font-size: 1.3rem; }
  .booking-header::after,
  .booking-header::before { display: none; }
}
</style>
</head>
<body>

<div class="booking-container">
    <div class="booking-header">
        <h1>Babel Camp Booking</h1>
        <p>Book your trip now at the best rates</p>
        <div class="location-tag">📍 Hurghada, Red Sea, Egypt</div>
    </div>

    <div class="booking-form">
        <form action="https://formspree.io/f/xqeybpog" method="POST" id="bookingForm">
            <div class="form-group">
                <label>Email:</label>
                <input type="email" name="email" class="input-field" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Departure Date:</label>
                <div class="date-group">
                    <select name="day" required></select>
                    <select name="month" required>
                        <option value="">Month</option>
                        <option>January</option><option>February</option><option>March</option><option>April</option>
                        <option>May</option><option>June</option><option>July</option><option>August</option>
                        <option>September</option><option>October</option><option>November</option><option>December</option>
                    </select>
                    <select name="year" required>
                        <option value="">Year</option>
                        <option>2025</option><option>2026</option><option>2027</option><option>2028</option>
                        <option>2029</option><option>2030</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Booking Type:</label>
                <select name="booking_type" id="bookingType" class="input-field" required>
                    <option value="">Select Type</option>
                    <option value="individual">Individual</option>
                    <option value="family">Family</option>
                </select>
            </div>

            <div class="form-group" id="individualBox" style="display:none;">
                <label>Number of Persons:</label>
                <input type="number" id="individualCount" name="individual_count" class="input-field" min="1" placeholder="Enter number">
            </div>

            <div id="familyBox" style="display:none;">
                <div class="form-group">
                    <label>Adults:</label>
                    <input type="number" id="adultsCount" name="adults_count" class="input-field" min="1" placeholder="Number of adults">
                </div>
                <div class="form-group">
                    <label>Children:</label>
                    <input type="number" id="childrenCount" name="children_count" class="input-field" min="0" placeholder="Number of children">
                </div>
                <div id="childrenAgesContainer"></div>
            </div>

            <div class="form-group" id="daysBox" style="display:none;">
                <label>Number of Days:</label>
                <input type="number" id="daysCount" name="days_count" class="input-field" min="1" value="1">
            </div>

            <div id="priceSummary"></div>

            <div class="form-group">
                <label>Phone Number:</label>
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <select name="code" required style="width:35%; min-width:100px; padding:12px; border-radius:12px; border:2px solid #e0e8f0; background:#f8fafc; font-size:0.95rem;">
                        <option value="">Code</option>
                        <option value="+20">+20 Egypt</option>
                        <option value="+966">+966 Saudi</option>
                        <option value="+971">+971 UAE</option>
                        <option value="+965">+965 Kuwait</option>
                        <option value="+974">+974 Qatar</option>
                        <option value="+1">+1 USA</option>
                        <option value="+44">+44 UK</option>
                        <option value="+49">+49 Germany</option>
                    </select>
                    <input type="tel" name="phone" class="input-field" placeholder="Enter your phone number" required maxlength="11" pattern="[0-9]{11}" style="flex:1; min-width:150px;">
                </div>
            </div>

            <button type="submit" class="btn-submit">Send Booking</button>
        </form>

        <div id="thankyou-msg">Thank you! Your booking has been submitted.</div>
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>
</div>

<script>
const daySelect = document.querySelector('select[name="day"]');
const monthSelect = document.querySelector('select[name="month"]');

function getDaysInMonth(month) {
    switch(month) {
        case 'February': return 28;
        case 'April': case 'June': case 'September': case 'November': return 30;
        default: return 31;
    }
}

function updateDays() {
    const month = monthSelect.value;
    const days = getDaysInMonth(month);
    const currentDay = daySelect.value;
    daySelect.innerHTML = '<option value="">Day</option>';
    for(let i = 1; i <= days; i++) {
        const opt = document.createElement('option');
        opt.value = i.toString().padStart(2, '0');
        opt.textContent = i.toString().padStart(2, '0');
        daySelect.appendChild(opt);
    }
    if(currentDay && currentDay <= days) daySelect.value = currentDay;
}

monthSelect.addEventListener('change', updateDays);
updateDays();

const bookingType = document.getElementById('bookingType');
const individualBox = document.getElementById('individualBox');
const familyBox = document.getElementById('familyBox');
const daysBox = document.getElementById('daysBox');
const individualCount = document.getElementById('individualCount');
const adultsCount = document.getElementById('adultsCount');
const childrenCount = document.getElementById('childrenCount');
const daysCount = document.getElementById('daysCount');
const priceSummary = document.getElementById('priceSummary');
const childrenAgesContainer = document.getElementById('childrenAgesContainer');

const priceIndividual = 1500;
const priceAdult = 1200;
const priceChild = 700;

bookingType.addEventListener('change', function() {
    individualBox.style.display = 'none';
    familyBox.style.display = 'none';
    daysBox.style.display = 'none';
    priceSummary.style.display = 'none';
    if(this.value === 'individual') { 
        individualBox.style.display = 'block'; 
        daysBox.style.display = 'block'; 
        calculatePrice();
    }
    else if(this.value === 'family') { 
        familyBox.style.display = 'block'; 
        daysBox.style.display = 'block'; 
        calculatePrice();
    }
});

childrenCount.addEventListener('input', function() {
    childrenAgesContainer.innerHTML = '';
    const count = parseInt(this.value) || 0;
    for(let i = 1; i <= count; i++) {
        const div = document.createElement('div');
        div.classList.add('form-group');
        div.innerHTML = `<label>Age of child ${i}:</label>
                         <input type="number" min="1" max="11" class="input-field childAge" name="child_${i}_age" placeholder="Enter age (max 11)">`;
        childrenAgesContainer.appendChild(div);
    }
    calculatePrice();
});

function calculatePrice() {
    let total = 0;
    const days = parseInt(daysCount.value) || 1;
    if(bookingType.value === 'individual') {
        const count = parseInt(individualCount.value) || 0;
        total = count * priceIndividual * days;
        if(days >= 3) total *= 0.9;
    } else if(bookingType.value === 'family') {
        const adults = parseInt(adultsCount.value) || 0;
        total += adults * priceAdult * days;
        const childInputs = document.querySelectorAll('.childAge');
        childInputs.forEach(input => {
            const age = parseInt(input.value) || 0;
            if(age <= 11) total += priceChild * days;
            else total += priceAdult * days;
        });
        if(days >= 3) total *= 0.9;
    }

    if(total > 0) { 
        priceSummary.style.display = 'block'; 
        priceSummary.innerHTML = `Total Price: <strong>${total.toLocaleString()} EGP</strong>`; 
    } else {
        priceSummary.style.display = 'none';
    }
}

[individualCount, adultsCount, childrenCount, daysCount].forEach(input => {
    if(input) input.addEventListener('input', calculatePrice);
});
document.addEventListener('input', e => {
    if(e.target.classList.contains('childAge')) calculatePrice();
});
calculatePrice();

const form = document.getElementById('bookingForm');
const thankyouMsg = document.getElementById('thankyou-msg');

form.addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(form);
    fetch(form.action, { method: form.method, body: formData, headers: { 'Accept': 'application/json' }})
    .then(response => {
        if(response.ok) {
            thankyouMsg.style.display = 'block';
            setTimeout(() => { window.location.href = 'index.html'; }, 2500);
            form.reset();
            childrenAgesContainer.innerHTML = '';
            priceSummary.style.display = 'none';
        } else {
            alert('Problem submitting booking. Try again.');
        }
    }).catch(() => {
        alert('Problem submitting booking. Try again.');
    });
});
</script>

</body>
</html>
