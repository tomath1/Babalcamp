<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babel Camp Booking</title>
<link rel="icon" href="1.1.1.jpeg">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif;}
body {min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(45deg,#ff6b6b,#4ecdc4,#45b7d1); background-size:300% 300%; animation:gradientBG 10s ease infinite; padding:10px;}
@keyframes gradientBG {0% {background-position:0% 50%;}50% {background-position:100% 50%;}100% {background-position:0% 50%;}}
.booking-container {background:rgba(255,255,255,0.98); border-radius:40px; box-shadow:0 30px 60px rgba(0,0,0,0.3); width:100%; max-width:480px; overflow:hidden; position:relative; z-index:10; animation:fadeInScale 0.6s ease;}
@keyframes fadeInScale {from {opacity:0; transform:scale(0.9);} to {opacity:1; transform:scale(1);}}
.booking-header {background:linear-gradient(135deg,#2c3e50,#3498db); color:white; padding:30px; text-align:center; position:relative;}
.booking-header h1 {font-size:2rem; margin-bottom:5px; letter-spacing:1px;}
.booking-header p {opacity:0.9; font-size:0.9rem;}
.booking-form {padding:20px;}
.form-group {margin-bottom:15px;}
label {display:block; margin-bottom:5px; color:#2c3e50; font-weight:600; font-size:0.9rem;}
.input-field {width:100%; padding:12px 15px; border:2px solid #ecf0f1; border-radius:12px; font-size:0.95rem; background:#f8f9fa; transition:all 0.3s ease;}
.input-field:focus {outline:none; border-color:#3498db; background:white; box-shadow:0 5px 15px rgba(52,152,219,0.2);}
.input-field:hover {border-color:#2c3e50;}
.date-group {display:flex; gap:8px; flex-wrap:wrap;}
.date-group select {flex:1; padding:12px; border:2px solid #ecf0f1; border-radius:12px; background:#f8f9fa; cursor:pointer; font-size:0.95rem;}
.date-group select:focus {outline:none; border-color:#3498db;}
.btn-submit {width:100%; padding:14px; background:linear-gradient(135deg,#2c3e50,#3498db); color:white; border:none; border-radius:12px; font-size:1rem; font-weight:bold; cursor:pointer; transition:all 0.3s ease; margin-top:15px;}
.btn-submit:hover {transform:translateY(-2px); box-shadow:0 10px 20px rgba(52,152,219,0.4);}
#thankyou-msg {display:none; text-align:center; margin-top:20px; padding:15px; background:#2ecc71; color:white; border-radius:12px; font-weight:bold; font-size:0.95rem;}
@media(max-width:480px){
    .booking-header h1 {font-size:1.6rem;}
    .booking-header p {font-size:0.85rem;}
    .btn-submit {font-size:0.95rem; padding:12px;}
    .date-group {flex-direction:column;}
}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="booking-container">
    <div class="booking-header">
        <h1>Babel Camp Booking</h1>
        <p>Book your trip now at the best rates</p>
    </div>

    <div class="booking-form">
        <form action="https://formspree.io/f/xqeybpog" method="POST" id="bookingForm">
            <div class="form-group">
                <label>Email:</label>
                <input type="email" name="email" class="input-field" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Departure Date:</label>
                <div class="date-group">
                    <select name="day" required></select>
                    <select name="month" required>
                        <option value="">Month</option>
                        <option>January</option><option>February</option><option>March</option><option>April</option>
                        <option>May</option><option>June</option><option>July</option><option>August</option>
                        <option>September</option><option>October</option><option>November</option><option>December</option>
                    </select>
                    <select name="year" required>
                        <option value="">Year</option>
                        <option>2025</option><option>2026</option><option>2027</option><option>2028</option>
                        <option>2029</option><option>2030</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Booking Type:</label>
                <select name="booking_type" id="bookingType" class="input-field" required>
                    <option value="">Select Type</option>
                    <option value="individual">Individual</option>
                    <option value="family">Family</option>
                </select>
            </div>

            <div class="form-group" id="individualBox" style="display:none;">
                <label>Number of Persons:</label>
                <input type="number" id="individualCount" name="individual_count" class="input-field" min="1" placeholder="Enter number">
            </div>

            <div id="familyBox" style="display:none;">
                <div class="form-group">
                    <label>Adults:</label>
                    <input type="number" id="adultsCount" name="adults_count" class="input-field" min="1" placeholder="Number of adults">
                </div>
                <div class="form-group">
                    <label>Children:</label>
                    <input type="number" id="childrenCount" name="children_count" class="input-field" min="0" placeholder="Number of children">
                </div>
                <div id="childrenAgesContainer"></div>
            </div>

            <div class="form-group" id="daysBox" style="display:none;">
                <label>Number of Days:</label>
                <input type="number" id="daysCount" name="days_count" class="input-field" min="1" value="1">
            </div>

            <div class="form-group" id="priceBox" style="display:none;">
                <label>Total Price:</label>
                <input type="text" id="totalPrice" name="total_price" class="input-field" readonly>
            </div>

            <div class="form-group">
                <label>Phone Number:</label>
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <select name="code" required style="width:35%; padding:12px; border-radius:12px; border:2px solid #ecf0f1;">
                        <option value="">Code</option>
                        <option value="+20">+20 Egypt</option>
                        <option value="+966">+966 Saudi</option>
                        <option value="+971">+971 UAE</option>
                        <option value="+965">+965 Kuwait</option>
                        <option value="+974">+974 Qatar</option>
                        <option value="+1">+1 USA</option>
                        <option value="+44">+44 UK</option>
                        <option value="+49">+49 Germany</option>
                    </select>
                    <input type="tel" name="phone" class="input-field" placeholder="Enter your phone number" required maxlength="11" pattern="[0-9]{11}">
                </div>
            </div>

            <button type="submit" class="btn-submit">
                Send Booking
            </button>
        </form>

        <div id="thankyou-msg">Thank you! Your booking has been submitted.</div>
    </div>
</div>

<script>
// الأيام حسب الشهر
const daySelect = document.querySelector('select[name="day"]');
const monthSelect = document.querySelector('select[name="month"]');
function getDaysInMonth(month){
    switch(month){
        case 'February': return 28;
        case 'April': case 'June': case 'September': case 'November': return 30;
        default: return 31;
    }
}
function updateDays(){
    const month = monthSelect.value;
    const days = getDaysInMonth(month);
    const currentDay = daySelect.value;
    daySelect.innerHTML = '<option value="">Day</option>';
    for(let i=1;i<=days;i++){
        const opt = document.createElement('option');
        opt.value = i.toString().padStart(2,'0');
        opt.textContent = i.toString().padStart(2,'0');
        daySelect.appendChild(opt);
    }
    if(currentDay && currentDay <= days) daySelect.value = currentDay;
}
monthSelect.addEventListener('change', updateDays);
updateDays();

// العناصر
const bookingType = document.getElementById('bookingType');
const individualBox = document.getElementById('individualBox');
const familyBox = document.getElementById('familyBox');
const priceBox = document.getElementById('priceBox');
const daysBox = document.getElementById('daysBox');

const individualCount = document.getElementById('individualCount');
const adultsCount = document.getElementById('adultsCount');
const childrenCount = document.getElementById('childrenCount');
const daysCount = document.getElementById('daysCount');
const totalPrice = document.getElementById('totalPrice');
const childrenAgesContainer = document.getElementById('childrenAgesContainer');

// الأسعار
const priceIndividual = 1500;
const priceAdult = 1200;
const priceChild = 700;

// إظهار الحقول حسب النوع
bookingType.addEventListener('change', function(){
    individualBox.style.display = 'none';
    familyBox.style.display = 'none';
    priceBox.style.display = 'none';
    daysBox.style.display = 'none';
    if(this.value==='individual'){ individualBox.style.display='block'; daysBox.style.display='block'; calculatePrice();}
    else if(this.value==='family'){ familyBox.style.display='block'; daysBox.style.display='block'; calculatePrice();}
});

// أعمار الأطفال
childrenCount.addEventListener('input', function(){
    childrenAgesContainer.innerHTML='';
    const count = parseInt(this.value)||0;
    for(let i=1;i<=count;i++){
        const div = document.createElement('div');
        div.classList.add('form-group');
        div.innerHTML = `<label>Age of child ${i}:</label>
                         <input type="number" min="1" max="11" class="input-field childAge" name="child_${i}_age" placeholder="Enter age (max 11)">`;
        childrenAgesContainer.appendChild(div);
    }
    calculatePrice();
});

// حساب السعر
function calculatePrice(){
    let total=0;
    const days = parseInt(daysCount.value)||1;

    if(bookingType.value==='individual'){
        const count=parseInt(individualCount.value)||0;
        total = count*priceIndividual*days;
    } else if(bookingType.value==='family'){
        const adults=parseInt(adultsCount.value)||0;
        total += adults*priceAdult*days;

        const childInputs=document.querySelectorAll('.childAge');
        childInputs.forEach(input=>{
            const age=parseInt(input.value)||0;
            if(age<=11) total+=priceChild*days;
            else total+=priceAdult*days;
        });
    }
    if(total>0){ priceBox.style.display='block'; totalPrice.value=total+' EGP'; }
    else priceBox.style.display='none';
}

// تحديث تلقائي
[individualCount, adultsCount, childrenCount, daysCount].forEach(input=>input.addEventListener('input',calculatePrice));
document.addEventListener('input',e=>{if(e.target.classList.contains('childAge')) calculatePrice();});
calculatePrice();

// إرسال الفورم
const form = document.getElementById('bookingForm');
const thankyouMsg = document.getElementById('thankyou-msg');
form.addEventListener('submit', function(e){
    e.preventDefault();
    const formData = new FormData(form);
    fetch(form.action,{method:form.method,body:formData,headers:{'Accept':'application/json'}})
    .then(response=>{
        if(response.ok){
            thankyouMsg.style.display='block';
            setTimeout(()=>{window.location.href='index.html';},2000);
            form.reset();
        } else {alert('Problem submitting booking. Try again.');}
    }).catch(()=>{alert('Problem submitting booking. Try again.');});
});
</script>

</body>
</html>
